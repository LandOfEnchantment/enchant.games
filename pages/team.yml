  ## Team Enchant

  We are a guild of software artisans building games under the Land of Enchantment Games banner.

  Interested in joining? Start by reading our [Mission](/?slug=mission) and [Values](/?slug=values), then participate in the [Community](/?slug=community). Membership in Team Enchant is earned and extended by invitation only.

  <img loading="lazy" alt="Adam Schaefers, Founder" src="/images/adam.webp" style="display: block; margin: 2rem auto; width: 50%; height: auto; -webkit-mask-image: radial-gradient(circle at center, black 55%, transparent 95%); mask-image: radial-gradient(circle at center, black 55%, transparent 95%); -webkit-mask-repeat: no-repeat; mask-repeat: no-repeat; -webkit-mask-size: cover; mask-size: cover; background-color: transparent;">

  > It feels a little strange being the only name on a page called *Team*. But every project starts somewhere. My hope is that this project will grow and that we'll pursue excellence together.

  <span class="text-muted">Adam Schaefers, Founder</span>


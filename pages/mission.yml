  ## Our Mission

  ### Open Community

  Game development is hard to do alone. We think it is best to put our minds together. Inspired by open source, we call this *"open knowledge."* This begins in the [Community](/?slug=community) and is open to all.

  ### Mentorship

  > "Iron sharpeneth iron; so a man sharpeneth the countenance of his friend" - Proverbs

  While we intend to mentor one another, we still approach the craft with a beginner's mind - always learning.

  ### We Are Not Only Making Games - We Are Making Gamedevs

  Our Discord is growing into a tight-knit group of like-minded solo developers (united by the [Values page](/?slug=values)) working on their craft. Inside are channels dedicated to **learning tracks** and personal **progress logs** where developers can check-in on some regular basis, to *build contagious momentum together.*

  ### Who We Are

  Currently we are a small, ragtag group of senior software developers working in different corners of the industry. One was previously in DevOps and is rerouting his life toward indie game development. Others are senior full-stack developers interested in game development, while some come from the world of Linux distribution development.

  ### Gatekept Team

  Developers who have built seriously within this community may, by invitation and mutual agreement, be added to the [Team Enchant](/?slug=team) page. Team membership reflects a closer relationship of trust, contribution, and shared standards.

  Team members may also take an email forwarding alias in the form of `you@enchant.games`, and receive marketing support for their games.

  ### Shared Reputation, Shared Standards, Shared Success

  Over time, our developers may choose different paths with the games they create. Some may decide to team up. Some may self-publish. Some may release on Steam with full copyright. Others may release open source or use hybrid models on itch.io. Others may sign with a publisher. Regardless, Team Enchant developers may publish their games on the [Games page](/?slug=games).

  There are **no contracts** required to participate. If you receive a publishing offer and want to take it, you are free to do so.

  As we begin to share the enchant name, we build a shared reputation that benefits everyone involved. Each successful release adds credibility to the ecosystem and helps the next developer who launches a game within the enchant orbit.

  - **Your game's success helps my game's success.**
  - **My game's success helps your game's success.**

  As a result, we are motivated to keep our standards high and to hold one another to them.

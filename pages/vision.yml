  ---

  ## Vision

  ### Open Knowledge

  Game development is hard to do alone. We think it is best to put our minds together. Inspired by open source, we call this *"open knowledge."*

  ### We are making real gamedevs

  Our Discord is growing into a tight-knit group of like-minded solo developers (united by the [values page](/?slug=values)) working on their craft. Inside are channels dedicated to **learning tracks** and personal **progress logs** where developers can check in some some regular basis, to *build contagious momentum together.*

  #### Current learning tracks include:

  - `learning-low-level-programming`

  - `learning-godot-gdscript`

  - `learning-game-art-fundamentals`

  - `learning-game-art-digital`

  - `learning-game-assets`

  Other future learning channels may include SDL2, Raylib, Bevy, Unity or Unreal.

  #### Who we are

  Currently we are a small, ragtag group of senior software developers working in different corners of the industry. One was previously in DevOps and is rerouting his life toward indie game development. Others are senior full-stack developers interested in game development, while some come from the world of Linux distribution development.

  #### Mentorship

  > "Iron sharpeneth iron; so a man sharpeneth the countenance of his friend" - Proverbs

  While we intend to mentor one another, we still approach the craft with a beginner’s mind - always learning.

  #### A Shared reputation under the Enchant.games umbrella

  Over time, developers may choose different paths with the games they create. Some may decide to team up. Some may self-publish. Some may release on Steam with full copyright. Others may release open source or use hybrid models on itch.io. Others may sign with a publisher.

  Ideally, many will choose to release at least partially under the enchant.games umbrella, or collaborate with the studio in some way while acknowledging that their game was developed as part of the enchant.games community.

  This is a way of giving back. We are rooting for your success - just don’t forget about us when you make it to the big leagues. There are **no contracts** required to participate. If you receive a publishing offer and want to take it, you are free to do so.

  #### We are an open incubator

  In one sense, this community acts as an open incubator. Developers can learn, build, and refine their games here alongside others pursuing the craft seriously.

  #### The Games Page

  The future [Games page](/?slug=games) will be curated. Only games made by invited Team members who have formally joined the Team may be listed there. This allows us to safeguard that page as a representation of work we are willing to publicly stand behind.

  #### Team Enchant

  Developers who have built seriously within this community may, by invitation and mutual agreement, be added to the Team. Team membership reflects a closer relationship of trust, contribution, and shared standards.

  For some, this may also serve as a meaningful professional signal: that even during periods outside formal employment, they were not idle, but actively sharpening their craft within a serious community and training pipeline.

  #### Marketing included

  As our reputation increases, so will our following. We will be hosting twitch streams, live coding sessions, game demos and previews, developer Q&A's.

  Members benefit from free marketing across Twitch, YouTube, Reddit, X and more - because we are proud to watch you build, and proud to stand behind your work.

  #### All we become we become together

  As we begin to share the enchant name, we build a shared reputation that benefits everyone involved. Each successful release adds credibility to the ecosystem and helps the next developer who launches a game within the enchant orbit.

  - **Your game’s success helps my game’s success.**
  - **My game’s success helps your game’s success.**

  As a result, we are motivated to keep our standards high and to hold one another to them.

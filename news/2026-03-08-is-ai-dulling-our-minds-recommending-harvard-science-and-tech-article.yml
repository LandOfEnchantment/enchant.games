title: Recommending Harvard Gazette - Is AI dulling our minds?
slug: 2026-03-08-recommending-harvard-gazette-is-ai-dulling-our-minds
date: 2026-03-08
author: Adam Schaefers
body: |

      This is going to be a short one.

      I recommend reading and sharing the following Harvard Gazette article by Liz Mineo, *Is AI dulling our minds?* with your friends:

      https://news.harvard.edu/gazette/story/2025/11/is-ai-dulling-our-minds/

      The piece centers on a recent MIT Media Lab study and opens with this summary:

      > "A recent MIT Media Lab study reported that 'excessive reliance on AI-driven solutions' may contribute to 'cognitive atrophy' and shrinking of critical thinking abilities. The study is small and is not peer-reviewed, and yet it delivers a warning that even artificial intelligence assistants are willing to acknowledge."

      It is worth reading in full. These stood out to me personally:

      Dan Levy's section, *The assignment is not the ultimate goal*, is good. We too often forget that this applies beyond academia.

      Christopher Dede's *An owl on your shoulder* is strong, especially this line:

      > "If AI is doing your thinking for you, whether it's through auto-complete or whether it's in some more sophisticated ways, as in 'I'd let AI write the first draft, and then I'll just edit it,' that is undercutting your critical thinking and your creativity."

      Fawwaz Habbal's section, *Only humans can solve human problems*, is another. His point that AI is powerful at data processing and statistics, while not having human experiences or true creativity is good.

      Tina Grotzer's *We're better than Bayesian* is great. We have pretty stinkin' good noodles.

      Jeff Behrends' section on cautionary tales is on point in its concern over offloading too much.

      For more context, here is the MIT Media Lab study: https://arxiv.org/pdf/2506.08872v1

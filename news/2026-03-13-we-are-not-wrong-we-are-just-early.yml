title: WIRED Gamers AI Nightmares are Coming True | A Commentary - We Are Not Wrong, Just Early
slug: 2026-03-13-we-are-not-wrong-we-are-just-early
date: 2026-03-13
author: Adam Schaefers
body: |

      ### WIRED dropped a bombshell this morning

      I just finished reading the WIRED article, [Gamers’ Worst Nightmares About AI Are Coming True](https://www.wired.com/story/gamers-ai-nightmares-are-coming-true/) by Helen Vogelsong-Danahue and I will be commenting on it here.

      The article lays out the facts about AI - that AI hurts games culturally, economically and materially. And it comes to the same conclusion we have with regard to the future of gaming:

      It is players who have the power to stop this LLM-mania.

      It's a *power to the players*™ situation right now, where the *game stops* with the common man.

      We in the Land of Enchantment Games community have known this and work hard to uniquely position ourselves to be ready for what is about to happen.

      ### Generative AI hurts games culturally

      > For gamers, it “didn’t matter” that the AI became “localized to a very specific and small part of the game,” though. Its mere presence diluted the entire experience and caused the company “reputational damage,”
      >
      > WIRED, Helen Vogelsong-Donahue, "Gamers' Worst Nightmares About AI Are Coming True," March 13, 2026.

      Gamers aren't having it. The audience isn't buying it. Players aren't playing it.

      Yet CEOs of game companies increasingly appear drunk on the AI-generative Kool-Aid. It is stunning how out-of-touch these people are with their audience!

      But players aren't playing it. Even if you convinced me that AI games were more fun-and they're not-even if you did, it wouldn't matter! Players aren't playing them.

      These CEOs are so drunk they still haven't figured out why players are playing old games. See [Have You Noticed Everyone Only Plays Old Games? - Asmongold TV](https://www.youtube.com/watch?v=LWKgNNzXNxQ) OH, I don't know, maybe players are tired of being kicked in the head by corporate coke head CEOs like a poor old dog in Florida!

      Because players are no longer tolerating being abused. Not like before. And this is a trend on the rise.

      ### Generative AI hurts games economically

      > A veteran game developer at Xbox says layoffs and fewer job postings have disproportionately impacted junior staffers, and now “everyone is just having seniors do the work.
      >
      > ...
      >
      > There’s a fear among the staff of major studios that make AAA games (like Playstation, Xbox, and Rockstar) that CEOs will continue to fall for the potential of AI rather than the reality, and thus gut workplaces. About 45,000 gaming employees lost their jobs from 2022 to the end of 2025, with up to 10,000 layoffs predicted for 2026.
      >
      > WIRED, Helen Vogelsong-Donahue, "Gamers' Worst Nightmares About AI Are Coming True," March 13, 2026.

      The trend of not hiring juniors is unsustainable - and yet another sign generative AI is a bubble.

      What will happen when the seniors get old and move on?

      These CEOs are gambling with the future of their companies and their shareholders' money. The shortsightedness of this is wild because it banks entirely on the idea that we will somehow have senior devs in the future without training juniors today. It assumes generative AI continues improving at the same rate. And it assumes that players will actually change their minds and decide to play AI games.

      And you know what the first 3 letters of "assume" are, just sayin'-

      and they are not "CEO"!

      I mean ... they do realize that all this is going to do is create more indie devs with more indie games and more platforms and communities similar to this one here, where I am overjoyed to welcome these ragamuffin junior devs with open arms in to my indie gamedev training pipeline?

      ### Generative AI hurts games materially

      > Data centers have siphoned RAM from the industry, resulting in a global memory shortage
      Gaming is “the only mass media entertainment where the creative ceiling is limited by consumer hardware,
      >
      > WIRED, Helen Vogelsong-Donahue, "Gamers' Worst Nightmares About AI Are Coming True," March 13, 2026.

      So, this is actually about DDR5. If the supply and demand of DDR5 is not solved, this ends in the GOAT'ing of the AM4 platform and the downfall of the Unreal Engine! Or even better: Unreal and devs that use Unreal decide to actually optimize their crap!

      This is actually the best part.

      - Players => save money
      - Devs &nbsp; => forced to optimize

      It's a win, win.

      The irony is this actually moves the industry forward towards progress.

      Moreover, this opens the door even wider for indie gamedevs, where the emphasis is not about having the ultimate ray tracing experience, but instead is about making games fun again.

      ### In conclusion we're not buying it

      > Because we will not buy their shit. And we will not give them explosive growth. We will not, you know, do cosplay. We will not go to cons. We will not generate merch. We will not make fan fiction. We will not make fan games. Like, we will do none of the things they want, because it sucks.
      >
      > WIRED, Helen Vogelsong-Donahue, "Gamers' Worst Nightmares About AI Are Coming True," March 13, 2026.

      Let the people say "AMEN" to this and I recommend everyone share the WIRED article with their friends.

      I have argued before and will continue to do so, that [gamers are uniquely poised to stand strong as a modern "salt of the earth" in the preservation of humanity.](/?slug=journal&article=2026-02-28-why-I-care) The future of gaming is not in the hands of AI-psychotic CEOs consumed with the blood of junior devs - no, the future of gaming is, as it has always been, in the hands of the common man.

      What is happening is a rupture. A "disruption" is what AI fanboys would call it.

      But AI will not satisfy players, therefore the rupture is going to leave a void.

      Since gamers are not braindead NPCs, they will turn to indie gaming on such a great scale that the world has not seen before - and it is indie gamedevs who are building in open community models like ours who are uniquely positioned to reap the benefits of the greater collapse of traditional models.

      With indie gaming being roughly half of sales on Steam in 2024, and with economists previously predicting indie gaming to be a 30 Billion marketcap by 2033, I would now expect that future number to be even higher.

      And that is why, **we at Land of Enchantment Games are not wrong, just early.**

      ### Addendum: food for thought

      Gamers have long stated, "If buying isn't owning, then piracy isn't theft."

      With the implementation of draconian lock-downs around 2020 and the rise of DRM subscription model services also came a rise in piracy-about 216 billion, a 66% increase in four years.

      What happens if they come to a similar conclusion about AI?

      If generative code and assets are trained on other people's work, will players decide that "AI-generated code isn't really yours-so piracy isn't theft?"

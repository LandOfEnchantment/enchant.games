title: For the Love of the Game | On Software Craftsmanship
slug: 2026-03-12-love-for-the-game
date: 2026-03-12
author: Adam Schaefers
body: |

      ### You don't love programming enough

      Up to now I have been arguing:

      > The modern programmer does not love software too much; he loves it too little - for he no longer loves the making of it.

      If you did, you would be up in arms about what is going down right now in software culture. The low quality code being shipped, the bloated software, it has been a problem long before LLMs arrived and made them worse.

      So first I will chart the historic degradation and stagnation of software to current day. Then we can talk about why this has happened, and how to be a change for the better.

      ### Beautiful code

      If I ask: *What program makes you look at the source and think "wow, this is beautiful code"?*

      Elegant. Simple. Functionally complete. Whole in itself. Not requiring a bazillion dependencies.

      What comes to mind?

      I tend to think of the software listed at places like https://suckless.org/rocks/ or the less harmful alternatives mentioned on https://harmful.cat-v.org/software/ as good examples of what can be beautiful code.

      Think of tools like:

      - ed
      - awk
      - sed
      - find
      - grep

      Programs that do one thing well.

      ### What we ship today

      Now look at what we ship today:

      - GNU glibc giga libs with extremely large codebases, huge ABI compatibility burdens, and very complex internal behavior that is difficult to replace or modify.

      The desktop stack exploded:

      - GTK/QT, Gnome/KDE services, Dbus, systemd services, pulseaudio->pipewire, consolekit, polkit, Xorg was abandoned, Wayland was inserted as half-baked, etc...

      Packaging culture is such that a simple program now:

      - depends on GTK
      - pulls glib, pango, cairo
      - pulls fontconfig, freetype
      - pulls harfbuzz
      - pulls dozens libs

      What was a simple program became a behemoth.

      If you think I am exaggerating, look at the dependency graph of a modern desktop environment. Here's a KDE dependency tree on Arch Linux:


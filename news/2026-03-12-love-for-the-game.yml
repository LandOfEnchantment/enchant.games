      > And we call this progress.

      Packaging culture:

      - enables every optional feature
      - pulls in dozens or hundreds of deps
      - ships huge runtime stacks

      > ...and did I mention that rust is in the kernel now?

      ### Really bad ecosystems: Node / Javascript

      - Node.js
      - npm

      often end up with

      `node_modules/`
      - 1500 packages
      - 80MB

      Have a look at the largest `package-lock.json` file on all of github: https://raw.githubusercontent.com/apache-superset/incubator-superset/refs/heads/master/superset-frontend/package-lock.json

      [Rust](https://www.bunniestudios.com/blog/2022/rust-a-critical-retrospective) and other ecosystems such as [Go, Python and Ruby](https://oneuptime.com/blog/post/2025-09-02-the-hidden-costs-of-dependency-bloat-in-software-development/view) are not exempt, either - it is a uniquely modern software engineering phenomenon.

      For more on the topic, I suggest reading [How Deep Does Your Dependency Tree Go? An Empirical Study of Dependency Amplification Across 10 Package Ecosystems](https://arxiv.org/html/2512.14739v1)

      > ...and this article does even intend to discuss the security implications of all this.

      ### Really bad software: Electron Apps

      The ultimate biggest loser contestants might be electron apps. These heavyweights bundle entire Chromium browsers, node runtimes and the application code all together, for *each application.*

      Ever noticed how slow `flatpak update` can be - maybe you thought you only needed to update Discord, but it's not updating *only* Discord. It's updating:

      - a web browser
      - a JavaScript runtime
      - a UI framework
      - a sandboxing system
      - a GPU rendering stack
      - and finally, somewhere inside all that, Discord.

      ### Framework culture

      Old mentality:

      - program -> system calls -> binary

      Modern mentality:

      A login form:

      - frontend framework -> React
      - frontend meta-framework -> Next.js
      - runtime -> Node.js
      - backend framework -> Express / NestJS
      - ORM -> Prisma
      - database -> PostgreSQL
      - cache -> Redis
      - container -> Docker
      - container orchestrator -> Kubernetes
      - ingress / load balancer -> NGINX|HAProxy|Traefik
      - service mesh -> Istio
      - observability -> Prometheus
      - observability dashboards -> Grafana
      - CI/CD pipeline -> GitHub Actions

      ### In 2026 it is getting worse, not better

      We now have senior developers vibe-coding, auto-generating hundreds of thousands of lines of code per week.

      We have not yet seen the final repercussions of this, but the outcome should be easy to predict: it will simply be an amplification of everything described above, proportional to how heavily LLMs are used.

      - dependency trees growing even larger and more fragile
      - software stacks becoming even more layered and indirect
      - more abstractions piled on top of abstractions
      - codebases expanding faster than humans can meaningfully review
      - systems that technically run, but that no single developer truly understansd

      ### And you tolerate it

      > None of this happened by accident.

      You see the problems modern software development philosophy has introduced.

      And you accept them anyway.

      The modern software developer either does not know the Unix philosophy, or does not care to keep things simple.

      You deserve this, then.

      > The problem is not that complex software exists.

      I am not saying complexity always => bad.

      > The problem is that programmers tolerate it.

      I am saying that the lack of love => tolerance of complexity.

      ### Because you don't love the game enough.

      When it comes to mastery of a craft, I love the example of Michael Jordan. And so I tend to reference his integrity and the mastery frequently. If you listen to him speak he tells you the secret of his success.

      > Be true to the game and the game will be true to you
      > - Michael Jordan

      And on the contrary:

      > Be false to the game and the game will be false to you
      > - Nobody

      So we must stop being false. This is the way forward.

      Shakespeare said it first in *Hamlet*:

      > To thine own self be true,
      >
      > And it must follow, as the night the day,
      >
      > Thou canst not then be false to any man.

      This long-known wisdom is nothing new. It is but only the perennial philosophy.
      And so now it it is time now to take ourselves back to Church, if only for a moment:

      > Whatsoever thy hand findeth to do, do it with thy might - Ecclesiastes


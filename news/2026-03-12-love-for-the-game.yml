      ### Do you love the game?

      The fact is, for numerous reasons, we are or have all been complicit to some degree or another along the way of our software journey. This article does not intend to condemn only, at least not without providing remedies.

      It's the classic scenario:

      > Forgive them Father for they know not what they do.

      But be of good cheer, friend, there is a better way:

      We do not *have* to be doomed to mediocrity forever.

      Here are some recommendations to help the meek software developer grow in stature.

      #### 1. Take a John Carmack vacation and get back to your roots

      See [John Carmack Goes On Coding Retreat With OpenBSD](https://www.facebook.com/permalink.php?story_fbid=2110408722526967&id=100006735798590)

      You need to touch grass. Get some sunlight. Breathe fresh air. Let your mind normalize away from the chaos.

      Rejuvenate yourself by doing some offline-only programming for a while. You know - using `man` pages and local documentation and being old school for a bit. Use `vi` or `mg`. No LSP, no LLM. This is about learning to enjoy the journey again, and learning to enjoy it just as much if not more than the destination.

      Find your love of the art, fresh and new.

      We deal with such a vast amount of garbage on a regular basis that exercises like this are necessary to rekindle the flame in our hearts for the pure game.

      #### 2. Minimize deps while preferring simple libs over frameworks

      Every dependency is borrowed complexity. Before adding, ask yourself

      - Do I understand this?
      - Could I write it myself?
      - Is this worth the lifetime maintenance cost?

      Good programmers delete dependencies. For more on this topic, see [Why does Software keep breaking?](https://www.youtube.com/watch?v=Aqj1Z1vgE6I)

      This is not to say libraries and dependencies are bad. And if using a couple of simple libraries will help you avoid an entire framework dependency in your project, then all the better.

      Frameworks tend to take ownership of the program and put themselves in the driver's seat. They force you into a set of trade-offs you may not even realize at the outset of your project.

      They also pull in large dependency trees outside your control.

      And they place you at the mercy of upstream developers. When the framework is abandoned, you are left with a million-line garbage pile and the uncomfortable task of pitching to your client a "total rebuild."

      #### 3. Read the classics

      And study Unix philosophy.

      <img src="/images/doom_black_book.webp" style="max-width:50%;height:auto;">

      - K&R
      - Donald Knuth
      - SICP
      - Game engine black book
      - etc.

      #### 4. Write small programs

      On this I recommend the talk by Sean Barrett,

      [Advice for Writing Small Programs in C](https://www.youtube.com/watch?v=eAhWIO1Ra6M)

      #### 5. Know your system

      Understanding how your operating system is put together gives you confidence and a foundation.

      - Filesystem
      - Boot Loader
      - Initramfs
      - Kernel
      - Init
      - Supervisor
      - Graphics stack
      - Audio stack
      - Getty, DHCP, Wifi, Desktop environment, etc.

      Compile your operating system from the ground up using Gentoo, or choose a more minimalist distro such as Kiss Linux. This will help you understand how to take apart, break, fix or improve your computer. This is empowering to the user and can be a lot of fun.

      #### 6. Know thyself

      We're not all the same.

      Do some of us love programming as much as Michael Jordan loved basketball? Yes.
      Do all of us? No.

      > Are you saying that not all programmers are equally good? Yes.

      If you want to be mediocre - if you keep things in your life that pull you away from the art of programming, make you a worse programmer, and you do nothing to change it - and you're *OK* with that -

      *that's fine.*

      Be *you.*

      But if you want to rise up and grow, light a fire in your soul, and be different from the herd, then join us.

      Stay the course.

      Let's work together to know ourselves and know our machines, and to build beautiful, good, and true programs and games using methodologies that reflect integrity.

      If you made it this far through all of my insufferable writing, you're probably already one of us.


title: Why I care about NOT using AI generative code and HOW I am building a business around NOT using it
slug: 2026-02-28-why-I-care
date: 2026-02-28
author: Adam Schaefers
body: |
      ### I was challenged by my friend...

      who is a devops engineer about why I am so strongly opposed to generative AI usage in code, when he said:

      > "You don't even work in IT anymore, why do you care so much"

      In this article, I will reply to this question **personally**, about **why I care.**

      The question is a presumptious one, that I have no skin in the game anymore, since I'm not developing products and software solutions in a paid context anymore.

      But on the contrary I have as much skin in the game as anyone. I fund my lifestyle and this idea out of my own pockets. I started enchant.games by myself waging a bet that gamers want to play human-created games and will not play AI games now, and even moreso, later. **My bet is on the opinionatedly humble gamer, not market research data, and not upcoming AI technology hype.** If I fail, it will be one of the following:

      - Me. Being the cause of failure myself, e.g. I do not create a game that is actually fun.

      or

      - Gamers. Gamers decided that AI games are better and indie games fall by the wayside. Humanity is damned, abandon hope all ye here.

      In the case of the first, I am fine with this, as it is a real possibility, but I leave the bet, and my future, in my own hands. This is a good place to be. Nobody else decides my fate, only me. Placing a bet on yourself, where you decide your fate, is the best bet you can place.

      In the case of the second, the bet now falls to humanity itself. I am betting on the good nature of humans, and not just any humans: Gamers. The bet is such that as AI tech evolves, that humans are resisting and will resist even further. **My bet is with the good country people, Flannery O'connor called them, that they are the "Salt of the earth."** If in the context of computers, I may call the gamer a good country people briefly, while they would not approve of the term broadly but I think in concept it fits.

      That gamers are the salt of the earth, speaking of tech culturally, is true because, **like country people and salt, gamers preserve some things:**

      ### That dragons exist and can be defeated

      In a world where kids are told to stay indoors, to not do this or that said thing, that "it's too dangerous."

      A good game can tell the child, "Yes, there be dragons." and "Yes, you can defeat them."

      And so it is natural that a gamer takes up this mantle, of dragon slayer. And a gamer carries this attitude, thousands of post-grind hours later, to the real world, where they find new dragons of various forms. Thus gamers are real-life dragon slayers.

      Enchant.games stands with these dragon slayers, that when they see what a dragon corporate LLM (AI) usage is evolving in to, that they will draw their swords and declare war against it, preferring the human race and virtue.

      ### The basis of culture: leisure

      Philosopher Josef Pieper calls [Leisure, the basis of culture](https://www.amazon.com/Leisure-Basis-Culture-Josef-Pieper/dp/1586172565) where he argues,

      > Leisure has been, and always will be, the first foundation of any culture. Pieper maintains that our bourgeois world of total labor has vanquished leisure, and issues a startling warning: Unless we regain the art of silence and insight, the ability for non-activity, unless we substitute true leisure for our hectic amusements, we will destroy our culture -- and ourselves.

      While it can obviously be noted that corporate games may often fall under a category of "hectic amusements" this need not be and is not always the case.

      Gamers are well-known for being "work-hard" "play-hard" people in to adulthood, they may nobly put in their time, "grinding" at work, only to come home to families and play quality games together with their families, creating new memories and cherishable times during such times of shared leisure, together.

      It is with this in mind that enchant places its bet, all-in while sliding the poker chips across the table, together with gamers.

      ### A generally anti-political correctness sentiment

      **Gamers value authenticity and respect, and are generally averse to being told "how to behave" by self-appointed behavioralists.** These self-appointed anti-fascists in general behave themselves (rather ironically) as fascists, with their codes and rules **depicting what was right yesterday is now wrong, while what was wrong yesterday, is now right.** And so the gamer's bullshit detectors all sound off together loudly, where then the gamers take their time (and their wallets) elsewhere, to a place where they are not demeaned in this way, where they are treated as valued and proper self-respecting humans, in no need of jannies.

      **And in this way, similarly enchant.games is independant culturally, and will not be jannied by that which is the ultimate janny: AI**. Moreover, we will not suffer to be bullied by AI techno consumerists, who spread the FOMO (fear of missing out) speech, "But you will fall behind" if we refuse the AI generative tech.

      ### Gamers being the salt of the earth, irritate some things

      Without making this article about my personal views, my favorite personalities, cultural or political figures in the gaming the community, the point I am attempting to make here is that in the gamer community, there is a tendency to platform figures who irritate people, who say things plainly, "as they see it", without "sugar-coating." **It is this truth-telling vehicular movement in gaming culture that is effectively dangerous, that maintains capability of shaking things up, as movers-and-shakers themselves, gamers are not afraid to rock the boat.**

      And when we are talking about a technology that is overhyped, oversold, such that the entire S&P 500 and global western economy is propped-up on a farce, it is my bet that it will be gamers who bring down the house of cards, when it is time for the house to fall, and we in enchant.games will still be here, doing what we have always done since the beginning.

      ### And so I took it personally

      Why do I care about the AI slop phenomenon in tech culture, gamedev or otherwise?

      - **Because I am not somebody who is tasked with creating shit, for which a shit-generator may possibly be the best tool to use.**

      - **Because I am somebody who codes with aim to change the world.**

      - **Because I am somebody who codes as an artist first, not as an "engineer."**

      - **Because I am somebody who codes to create (and pass-down) a legacy, not some quick product for a socio-pathic corporation.**

      - **Because I am somebody who codes to set others free, not to enslave others.**

      ### Video games: The most important software in the world

      If video games are a natural and modern method of interactive story telling and game playing. And if as G.K. Chesterton says,

      > "Fairy tales do not tell children the dragons exist. Children already know that dragons exist. Fairy tales tell children the dragons can be killed."

      It follows naturally, then that if you believe children are the most important beings of this world, that the stories and games they play then should be considered the most important. And that means, then that since the late 1970s and early 1980s golden age of video games, that video games have been the most important software. Period.

      And this may be coupled together with Josef Pieper's argument for Leisure, such that the importance then of Video Games in software development must not be understated.

      ### Video games: Too important to leave in the hands of generative AI

      Finally, the last bit here then is that **we believe at enchant.games that games are too important to be left in the hands of generative AIs, LLMs et al.** That the **removal of the human from the code is the removal of the soul of gaming**, and that, among all the other problems, ends in the demise of what makes both creating and playing video games, uniquely human.

      **What follows is our official Discord policy on usage of LLMs:**

      - I am convicted more now than ever, after testing thoroughly the best "agentic" driven methods and models in current existence, that LLMs trained on the entire internet is a borrow now, pay later approach to development, where most will not be able to pay up later - so is unsustainable. It's a tech-debt by default approach. It is also inhumane and against proper ethics, as giving a task that a human would not do himself, to a robot to do instead, all-the-while still intending for later human consumption, implies then that humans should consume things that humans would not prepare for themselves - the whole process is sterile and a violation of do unto others.

      - No AI slop policy is now in full effect after some recent experimentation and testing of the so-called latest and greatest methods on my part. I don't care if you use AI like google, as a tool in your toolbox, a teacher to help learn some concept or thing, and I won't be a nazi about the subject as I have spent quite a bit of time experimenting and playing with it myself before drawing my own conclusions, but there's a hard line to be drawn at letting it generate code and assets for you on your behalf. This hard-line is about ownership of understanding. Use of AI as reference: I am neutral. Use of AI as explanation tool: again I am neutral. But we must not outsource our brains, creative faculties, or the art of programming itself. And we must not expect others to consume work we were unwilling to meaningfully craft ourselves.

      - This server hopes to keep the the DIY spirit alive, even if it is only hope, that still being virtuous when all hope is lost, is a beautiful thing.

title: Now Who Is The Doomer
slug: 2026-02-29-now-who-is-the-doomer
date: 2026-02-29
author: Adam Schaefers
body: |
      ### OK, DOOMER?

      At times I have been accused of dooming too hard on the sad state of tech.

      This piece aims to be a bit more optimistic.

      It's so important to me for me and for my friends, to get this issue (on LLMs) right and to communicate a stance with clarity and punch.

      There is so much **FOMO**, so much **fear** **uncertainty** and **doubt** (FUD), so much **disinfo and misinfo** about generative AI being pushed on coders right now from every direction (X, youtube, linkedin, reddit, hacker news, etc.)

      If you believed what these people were to say, then why bother even learning to code. **Why not just, to hell with it, then.**

      It's a massive investment, to learn to code. And to learn to code in 2026? These people would have you think you're gambling with your life. The fear must be paralyzing for a new-comer.

      Here's the good part: it's an unspoken rule, almost a guaranteed home-run, that when investing, when you smell fear, when you walk in the valley of the shadow of death, to **BUY**, that's a signal. The market is oversold, hit the buy button and hold for the rebound. **Invest in your programming education. Invest in the art of programming. Invest in gamers. And invest in yourself.**

      We will see that in coding. Today the media says, "Why bother learn to code, AI can do it for us." Tomorrow the media with pants-on-fire will be screaming "Hiring programmers!" to fix the shit-show that is generative AI codebases.

      **It is a great time to learn the art of programming in 2026.**


title: Let's be gamedevs
slug: 2025-12-18-upcoming-game-studio
date: 2025-12-18
author: Adam Schaefers
body: |
      ##### Devops is dead, let's be gamedevs.

      and...

      ##### Let's make something beautiful.

      If the art of code is to be considered. If beauty goodness and truth matter. If integrity of software is anything...

      Is not the most human thing to do, in an **a**nti **i**ntelligence world, **to buck the system and make indie games, by humans for humans?**

      As AI slop propagates, demand for non-GMO organic games will rise.

      And why is a game important? Nay, why is a video game **the most important software in the world?**

      Chesterton's reply on Fairy Tales provides the best answer:

      > "Fairy tales do not tell children the dragons exist. Children already know that dragons exist. Fairy tales tell children the dragons can be killed."
      >
      > - G.K. Chesterton.

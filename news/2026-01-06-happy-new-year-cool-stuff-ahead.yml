title: Happy New Year - Cool Stuff Ahead
slug: 2026-01-06-happy-new-year-cool-stuff-ahead
date: 2026-01-06
author: Adam Schaefers
body: |
      ##### Discord

      Our Discord is growing in to a tight-nit small group of like minded solo devs (for now), working on our craft, we have many private channels with learning tracks and personal progress trackers where we can sign in and get to work on our games.

      Currently I have created the following tracks:

      - `learning-coder-foundations`
      - `learning-godot`
      - `learning-game-art-fundamentals`
      - `learning-game-art-digital`
      - `learning-game-audio`
      - `learning-art-of-game-design`

      Others may create their own tracks and learning plans as they progress. While ideally all of us will attempt to create our own `$USERNAME-foo-bar-progress-logs` channel where we can report in some some regular basis how we and our projects are going.

      In the end, we may decide to self publish, or team up and release under enchant.games, or associate with in some way if enchant.games association is deemed worthy to associate and a helpful match.

      ##### Enchant.Games organic growth marketing plan

      Ideally we get to a point where, we do occasional livestreams and live coding on Twitch, game previews, etc.

      From there, we'll repost to Youtube for a long-term replay value.

      We'll shout out links to the Youtube (and devlogs here) on X and Reddit.

      And if we create anything open source of value, it gets released on Github.

      And so the theory is that as we begin doing cool stuff, it will in turn begin to market itself across our socials. The worst thing ever would be to spend years solodev on a game only to have no audience to appreciate and enjoy its value. Thankfully, by planning ahead, we can get this right out from the gate and avoid the issue.
